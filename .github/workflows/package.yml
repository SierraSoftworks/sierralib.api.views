name: Publish NuGet Package

on:
  push:
    branches:
      - main
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write
      packages: write

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
        
      - name: Setup .NET Core
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore dependencies
        run: dotnet restore    

      - name: Test the package
        run: dotnet test

      - name: Build the package
        run: dotnet pack -o out --configuration Release

      - name: Publish the package
        run: |
          cp ./.github/workflows/nuget.config ./
          dotnet nuget push out/*.nupkg -s GitHub --skip-duplicate
          if [ -n "$NUGET_API_KEY" ]; then
            dotnet nuget push out/*.nupkg -s https://api.nuget.org/v3/index.json -k "$NUGET_API_KEY" --skip-duplicate
          else
            echo "NUGET_API_KEY not configured, skipping push to nuget.org."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
